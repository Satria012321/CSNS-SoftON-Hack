name: Build CSN:S SoftON

on:
  workflow_dispatch: # Trigger manual dari tab Actions
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
      with:
        submodules: 'recursive' # Penting untuk mengambil library eksternal jika ada

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1

    - name: Restore NuGet Packages
      run: |
        # Cari file solution utama
        $slnFile = Get-ChildItem -Filter *.sln -Recurse | Select-Object -First 1
        if ($slnFile) {
          Write-Host "Found solution: $($slnFile.Name)"
          nuget restore $slnFile.FullName
        } else {
          Write-Error "No .sln file found in repository!"
          exit 1
        }

    - name: Build Libraries (Dependencies)
      run: |
        # Build project library terlebih dahulu jika terpisah
        # Biasanya MSBuild akan menangani dependensi otomatis lewat .sln, 
        # tapi kita pastikan konfigurasi Release aktif
        $slnFile = Get-ChildItem -Filter *.sln -Recurse | Select-Object -First 1
        
        # Build seluruh solusi dalam mode Release x86 (Game CSNZ biasanya 32-bit)
        msbuild $slnFile.FullName `
          /p:Configuration=Release `
          /p:Platform=x86 `
          /maxcpucount `
          /verbosity:minimal

    - name: Build Solution (x64 Version) - Optional Backup
      continue-on-error: true
      run: |
        $slnFile = Get-ChildItem -Filter *.sln -Recurse | Select-Object -First 1
        msbuild $slnFile.FullName `
          /p:Configuration=Release `
          /p:Platform=x64 `
          /maxcpucount `
          /verbosity:minimal

    - name: Locate Build Artifacts
      run: |
        # Tampilkan struktur folder untuk debugging
        Get-ChildItem -Recurse -Include *.dll,*.exe | Select-Object FullName

    - name: Upload Build Results
      uses: actions/upload-artifact@v3
      with:
        name: SoftON-Build-Output
        path: |
          **/bin/Release/**/*.dll
          **/bin/Release/**/*.exe
          **/client/bin/**/*.dll
          **/client/bin/**/*.exe
          **/Release/**/*.dll
          **/Release/**/*.exe
        retention-days: 14
        if-no-files-found: error
