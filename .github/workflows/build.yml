name: Build CSN:S SoftON Fixed

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
      with:
        submodules: 'recursive' # Penting untuk download library eksternal
        fetch-depth: 0

    - name: Debug Directory Structure
      run: |
        Write-Host "=== Listing All Files ==="
        Get-ChildItem -Recurse | Select-Object FullName
        Write-Host "=== Looking for .sln files ==="
        Get-ChildItem -Filter *.sln -Recurse | Select-Object FullName

    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1

    - name: Restore NuGet Packages
      run: |
        $slnFiles = Get-ChildItem -Filter *.sln -Recurse
        if ($slnFiles.Count -eq 0) {
          Write-Error "ERROR: No .sln file found! Check the directory structure above."
          exit 1
        }
        
        $mainSln = $slnFiles[0]
        Write-Host "Building solution: $($mainSln.Name)"
        nuget restore $mainSln.FullName -Verbosity detailed

    - name: Build Solution (Release x86)
      run: |
        $slnFiles = Get-ChildItem -Filter *.sln -Recurse
        $mainSln = $slnFiles[0]
        
        msbuild $mainSln.FullName `
          /p:Configuration=Release `
          /p:Platform=x86 `
          /p:BuildProjectReferences=true `
          /maxcpucount `
          /verbosity:detailed
          
    - name: Upload Artifacts
      uses: actions/upload-artifact@v4  # <--- SUDAH DIPERBAIKI KE V4
      with:
        name: SoftON-Fixed-Build
        path: |
          **/bin/Release/**/*.dll
          **/bin/Release/**/*.exe
          **/client/bin/**/*.dll
          **/client/bin/**/*.exe
        retention-days: 7
        if-no-files-found: warn
